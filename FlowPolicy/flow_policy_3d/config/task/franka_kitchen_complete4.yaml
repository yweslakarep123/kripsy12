name: franka_kitchen_complete4

task_name: ${name}

shape_meta: &shape_meta
  obs:
    point_cloud:
      shape: [512, 3]
      type: point_cloud
    agent_pos:
      shape: [9]
      type: low_dim
  action:
    shape: [9]

env_runner:
  _target_: flow_policy_3d.env_runner.kitchen_runner.KitchenRunner
  eval_episodes: 20
  n_obs_steps: ${n_obs_steps}
  n_action_steps: ${n_action_steps}
  fps: 12
  n_envs: null
  n_train: null
  n_test: null
  task_name: ${task_name}
  device: ${training.device}
  use_point_crop: ${policy.use_point_crop}
  max_steps: 280
  tasks_to_complete:
    - microwave
    - kettle
    - slide cabinet
    - light switch

dataset:
  _target_: flow_policy_3d.dataset.kitchen_dataset.KitchenDataset
  zarr_path: data/franka_kitchen_complete4_expert.zarr
  horizon: ${horizon}
  pad_before: ${eval:'${n_obs_steps}-1'}
  pad_after: ${eval:'${n_action_steps}-1'}
  seed: 42
  val_ratio: 0.02
  max_train_episodes: null
  train_episode_indices: null
  val_episode_indices: null
  preprocessing_profile: minimal
  obs_noise_std: null
