# Urutan: microwave → kettle → light switch → slide cabinet (satu episod, reward per tahap).
name: franka_kitchen_sequential4

task_name: ${name}

shape_meta: &shape_meta
  obs:
    agent_pos:
      shape: [59]
      type: low_dim
  action:
    shape: [9]

policy:
  obs_encoder_type: state
  encoder_output_dim: 64
  state_encoder_cfg:
    mlp_hidden_dims: [256, 256]
    use_layernorm: false

env_runner:
  _target_: flow_policy_3d.env_runner.kitchen_runner.KitchenRunner
  eval_episodes: 20
  n_obs_steps: ${n_obs_steps}
  n_action_steps: ${n_action_steps}
  fps: 12
  n_envs: null
  n_train: null
  n_test: null
  task_name: ${task_name}
  device: ${training.device}
  obs_mode: state
  max_steps: 280
  tasks_to_complete: null
  task_completion_order:
    - microwave
    - kettle
    - light switch
    - slide cabinet
  terminate_on_tasks_completed: false

dataset:
  _target_: flow_policy_3d.dataset.kitchen_dataset.KitchenDataset
  zarr_path: data/franka_kitchen_sequential4_expert.zarr
  horizon: ${horizon}
  pad_before: ${eval:'${n_obs_steps}-1'}
  pad_after: ${eval:'${n_action_steps}-1'}
  seed: 42
  val_ratio: 0.02
  max_train_episodes: null
